<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木工職能認證</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #f8f4ee;
    --bg2: #ede8de;
    --card: #ffffff;
    --border: #ddd6c8;
    --text: #1c1812;
    --muted: #8a7d6a;
    --shadow: rgba(70,45,10,0.10);
    --primary: #8B4513;
    --primary-light: #A0522D;
    --success: #2a6634;
    --star-off: #e0d8cc;
    --star-on: #e6a030;
    --done-bg: #e7f4e9;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 24px 48px;
  }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 20px;
  }
  .brand { display: flex; align-items: center; gap: 18px; }
  .passport-cover {
    width: 54px; height: 70px;
    background: linear-gradient(160deg, #c47830 0%, #8a4510 100%);
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    box-shadow: 3px 4px 0 rgba(0,0,0,0.30);
  }
  .passport-cover .pc-icon { font-size: 22px; }
  .passport-cover .pc-text {
    font-size: 6.5px; letter-spacing: 1.5px;
    color: rgba(255,255,255,0.70); text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  .brand-text h1 { font-size: 24px; font-weight: 900; }
  .brand-text p {
    font-size: 11px; color: rgba(255,255,255,0.6);
    letter-spacing: 2px; text-transform: uppercase;
    margin-top: 4px; font-family: 'DM Mono', monospace;
  }

  /* Employee Info */
  .employee-section {
    background: white;
    margin: 24px 48px;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .employee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .info-field { display: flex; flex-direction: column; }
  .info-field label { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  .info-field input, .info-field select {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 1rem;
  }
  .name-search {
    display: flex;
    gap: 8px;
  }
  .name-search input {
    flex: 1;
  }
  .btn-search {
    padding: 10px 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .btn-search:hover {
    background: var(--primary-light);
  }
  .info-display {
    padding: 10px;
    background: var(--bg2);
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 500;
  }
  .employee-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
  }
  .name-search select {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 1rem;
  }
  .employee-banner {
    margin-top: 20px;
    padding: 20px 24px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    border-radius: 12px;
    text-align: center;
    color: white;
  }
  .banner-label {
    display: block;
    font-size: 0.85rem;
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .banner-name {
    display: block;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 4px;
  }

  /* Dashboard */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin: 0 48px 24px;
  }
  .stat-card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--shadow);
    text-align: center;
  }
  .stat-card h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .stat-card .value { font-size: 2rem; font-weight: bold; color: var(--primary); }
  .stat-card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .level-badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
  }
  .level-F { background: #E3F2FD; color: #1976D2; }
  .level-E { background: #E8F5E9; color: #388E3C; }
  .level-D { background: #FFF3E0; color: #F57C00; }
  .level-C { background: #FCE4EC; color: #C2185B; }
  .level-B { background: #F3E5F5; color: #7B1FA2; }
  .level-A { background: #FFEB3B; color: #F57F17; }

  /* Progress Bar */
  .progress-section {
    margin: 0 48px 24px;
    background: white;
    padding: 16px 24px;
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .progress-bar {
    height: 20px;
    background: #E0E0E0;
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--success));
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.8rem;
    font-weight: bold;
  }

  /* Main Tabs */
  .main-tabs {
    display: flex;
    gap: 4px;
    margin: 0 48px 20px;
    flex-wrap: wrap;
  }
  .main-tab {
    padding: 12px 24px;
    background: white;
    border: 2px solid var(--border);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.3s;
  }
  .main-tab:hover { background: var(--bg2); }
  .main-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Skills Section */
  .cat-nav {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    display: flex; overflow-x: auto; scrollbar-width: none;
    margin: 0 48px;
    border-radius: 8px 8px 0 0;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-tab {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 16px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    cursor: pointer; border: none; background: transparent;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .cat-tab:hover { color: var(--text); background: rgba(0,0,0,0.04); }
  .cat-tab.active { color: var(--text); border-bottom-color: var(--tab-c); }
  .tab-badge {
    font-size: 9px; font-family: 'DM Mono', monospace;
    padding: 2px 6px; border-radius: 99px;
    background: var(--border); color: var(--muted);
  }
  .cat-tab.active .tab-badge { background: var(--tab-c); color: #fff; }

  .skills-content {
    background: white;
    margin: 0 48px;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 2px 8px var(--shadow);
    padding: 24px;
  }
  .cat-section { display: none; }
  .cat-section.active { display: block; }
  .cat-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
  }
  .cat-header-icon {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .cat-header-text h2 { font-size: 18px; font-weight: 800; }
  .cat-header-text p { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* Subcategory Header */
  .subcat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0 8px;
    margin-top: 16px;
    border-bottom: 2px solid var(--border);
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
  }
  .subcat-header:first-of-type { margin-top: 0; }
  .subcat-icon { font-size: 18px; }
  .subcat-count {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    background: var(--bg2);
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: auto;
  }

  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .skill-card {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: all 0.2s;
    position: relative;
  }
  .skill-card:hover { box-shadow: 0 4px 16px var(--shadow); transform: translateY(-2px); }
  .skill-card.done { border-color: var(--success); background: var(--done-bg); }
  .card-stripe { height: 4px; }
  .card-main { padding: 12px 14px; }
  .card-top-row {
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px; margin-bottom: 8px;
  }
  .card-no {
    font-size: 10px; font-family: 'DM Mono', monospace;
    color: var(--muted);
  }
  .card-pts {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--primary); font-weight: 600;
  }
  .card-check {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; cursor: pointer;
    transition: all 0.2s;
    color: transparent; background: transparent;
  }
  .card-check:hover { border-color: var(--success); color: var(--success); }
  .done .card-check { background: var(--success); border-color: var(--success); color: #fff; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .card-desc { font-size: 11px; color: var(--muted); }
  .card-footer {
    padding: 10px 14px;
    background: rgba(0,0,0,0.02);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .done .card-footer { background: rgba(42,102,52,0.05); }
  .actual-pts {
    font-size: 11px;
    color: var(--success);
    font-weight: 600;
    font-family: 'DM Mono', monospace;
  }
  .card-cert {
    padding: 8px 14px;
    background: rgba(0,0,0,0.02);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .mentor-select {
    flex: 1;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
  }
  .card-cert .date-input {
    width: 110px;
    padding: 6px;
    font-size: 11px;
  }
  .btn-cert {
    padding: 6px 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
  }
  .btn-cert:hover { background: var(--primary-light); }
  .card-history {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s;
  }
  .done .card-history { max-height: 200px; }
  .history-title {
    padding: 6px 14px;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px dashed var(--border);
  }
  .history-item {
    padding: 4px 14px;
    font-size: 10px;
    display: flex;
    gap: 8px;
    color: var(--muted);
  }
  .history-date { font-family: 'DM Mono', monospace; }
  .history-mentor { color: var(--primary); }
  .history-stars { color: var(--star-on); }
  .stars { display: flex; gap: 2px; }
  .star {
    font-size: 16px; cursor: pointer;
    color: var(--star-off);
    transition: all 0.15s;
  }
  .star:hover { transform: scale(1.2); }
  .star.lit { color: var(--star-on); }
  .date-input {
    font-size: 11px; font-family: 'DM Mono', monospace;
    border: none; background: transparent;
    color: var(--muted); width: 90px;
  }
  .done-stamp {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; font-family: 'DM Mono', monospace;
    padding: 2px 6px; border-radius: 4px;
    border: 1.5px solid var(--success); color: var(--success);
    background: rgba(232,245,234,0.9);
    transform: rotate(-8deg);
    opacity: 0; transition: opacity 0.3s;
  }
  .done .done-stamp { opacity: 1; }
  .skill-card.locked { border-color: #ffc107; }
  .skill-card.locked .card-check { background: #ffc107; border-color: #ffc107; cursor: not-allowed; }
  .skill-card.locked .star { cursor: not-allowed; pointer-events: none; }
  .skill-card.locked .btn-cert { display: none; }
  .skill-card.locked .mentor-select { pointer-events: none; background: #f5f5f5; }
  .skill-card.locked .date-input { pointer-events: none; }
  .locked-stamp {
    position: absolute; top: 8px; left: 8px;
    font-size: 9px; font-family: 'DM Mono', monospace;
    padding: 2px 6px; border-radius: 4px;
    border: 1.5px solid #ffc107; color: #ffc107;
    background: rgba(255,248,225,0.95);
    transform: rotate(8deg);
    opacity: 0; transition: opacity 0.3s;
  }
  .locked .locked-stamp { opacity: 1; }
  .viewer-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-left: 8px;
  }
  .viewer-admin { background: #ffeb3b; color: #f57f17; }
  .viewer-leader { background: #e3f2fd; color: #1976d2; }

  /* Training Section */
  .training-section {
    background: white;
    margin: 0 48px;
    border-radius: 12px;
    box-shadow: 0 2px 8px var(--shadow);
    overflow: hidden;
  }
  .section-header {
    background: var(--primary);
    color: white;
    padding: 16px 24px;
    font-size: 1.1rem;
    font-weight: bold;
  }
  .week-card { border-bottom: 1px solid var(--border); }
  .week-header {
    padding: 14px 24px;
    background: linear-gradient(90deg, var(--bg2), white);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .week-header:hover { background: var(--bg2); }
  .week-title { font-weight: bold; }
  .week-progress {
    font-size: 0.85rem;
    padding: 4px 12px;
    background: var(--primary);
    color: white;
    border-radius: 20px;
  }
  .week-content { padding: 16px 24px; }
  .week-content.hidden { display: none; }
  .training-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #EEE;
    align-items: flex-start;
  }
  .training-item:last-child { border-bottom: none; }
  .training-item input[type="checkbox"] {
    width: 18px; height: 18px;
    margin-top: 2px;
    accent-color: var(--success);
  }

  /* Salary Table */
  .salary-section {
    margin: 0 48px;
  }
  .salary-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
  }
  .salary-table th, .salary-table td {
    padding: 12px 16px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .salary-table th {
    background: var(--primary);
    color: white;
  }
  .salary-table tr:hover { background: #FAFAFA; }
  .salary-table tr.current { background: #FFF3E0; font-weight: bold; }

  /* Actions */
  .actions {
    display: flex;
    gap: 12px;
    margin: 24px 48px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 500;
    transition: all 0.3s;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-secondary { background: #E0E0E0; color: var(--text); }
  .btn-secondary:hover { background: #BDBDBD; }
  .btn-success { background: var(--success); color: white; }

  @media (max-width: 768px) {
    header, .employee-section, .dashboard, .progress-section,
    .main-tabs, .cat-nav, .skills-content, .training-section,
    .salary-section, .actions { margin-left: 16px; margin-right: 16px; }
    header { padding: 20px 16px; }
    .skills-grid { grid-template-columns: 1fr; }
  }
  @media print {
    .actions, .main-tabs { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="passport-cover">
        <span class="pc-icon">🪵</span>
        <span class="pc-text">Competency</span>
      </div>
      <div class="brand-text">
        <h1>木工職能認證</h1>
        <p>Carpentry &amp; Interior · Competency Certification</p>
      </div>
    </div>
    <div style="text-align: right; font-size: 0.9rem;">
      <div>摩研室內裝修</div>
      <div id="currentDate"></div>
    </div>
  </div>
</header>

<div id="loginRequired" class="employee-section" style="display:none;">
  <div style="text-align:center;padding:40px 20px;">
    <div style="font-size:4rem;margin-bottom:16px;">🔐</div>
    <h2 style="margin-bottom:12px;color:var(--primary);">請先登入</h2>
    <p style="color:var(--muted);margin-bottom:24px;">請透過員工入口登入後再使用職能認證系統</p>
    <a href="員工自助入口.html" style="display:inline-block;padding:14px 32px;background:var(--primary);color:white;text-decoration:none;border-radius:8px;font-weight:600;">前往員工入口登入</a>
  </div>
</div>

<div id="mainContent" class="employee-section" style="display:none;">
  <div class="employee-grid">
    <div class="info-field">
      <label>🔐 登入身份</label>
      <div id="viewerDisplay" class="info-display" style="display:flex;align-items:center;justify-content:space-between;">
        <span id="viewerName">-</span>
        <button onclick="logout()" style="padding:4px 12px;background:#e74c3c;color:white;border:none;border-radius:4px;font-size:0.8rem;cursor:pointer;">登出</button>
      </div>
    </div>
    <div class="info-field">
      <label>員工姓名</label>
      <div class="name-search">
        <select id="employeeName" onchange="onEmployeeSelect()">
          <option value="">請選擇員工</option>
        </select>
        <button class="btn-search" onclick="searchEmployee()">🔍 查詢</button>
      </div>
    </div>
    <div class="info-field">
      <label>所屬團隊</label>
      <div id="teamDisplay" class="info-display">-</div>
    </div>
    <div class="info-field">
      <label>目前日薪</label>
      <div id="currentSalary" class="info-display">-</div>
    </div>
    <div class="info-field">
      <label>職級</label>
      <div id="currentRank" class="info-display">-</div>
    </div>
    <div class="info-field">
      <label>最後認證</label>
      <div id="lastCertDate" class="info-display">-</div>
    </div>
  </div>
  <div id="employeeNameBanner" class="employee-banner" style="display:none;">
    <span class="banner-label">職能認證持有人</span>
    <span class="banner-name" id="bannerName"></span>
  </div>
</div>

<div class="dashboard">
  <div class="stat-card">
    <h3>目前總分</h3>
    <div class="value" id="totalScore">0</div>
    <div class="sub">滿分 431 分</div>
  </div>
  <div class="stat-card">
    <h3>已完成技能</h3>
    <div class="value" id="doneCount">0</div>
    <div class="sub">共 154 項</div>
  </div>
  <div class="stat-card">
    <h3>技能等級</h3>
    <div id="levelBadge" class="level-badge level-F">🔰 F 級</div>
  </div>
  <div class="stat-card">
    <h3>對應日薪</h3>
    <div class="value" id="dailySalary">1,300</div>
    <div class="sub">新台幣</div>
  </div>
  <div class="stat-card">
    <h3>入職訓練</h3>
    <div class="value" id="trainingProgress">0%</div>
    <div class="sub" id="trainingWeek">進行中</div>
  </div>
</div>

<div class="progress-section">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
  </div>
</div>

<div class="main-tabs">
  <div class="main-tab active" data-tab="skills">📋 技能認證</div>
  <div class="main-tab" data-tab="training">📚 入職訓練</div>
  <div class="main-tab" data-tab="salary">💰 薪資對照表</div>
</div>

<!-- Skills Tab -->
<div id="skills-tab" class="tab-content active">
  <nav class="cat-nav" id="cat-nav"></nav>
  <div class="skills-content" id="skills-content"></div>
</div>

// 根據日薪計算目標技能分數
function getTargetScoreFromSalary(salary) {
  const salaryMap = [
    { salary: 1300, score: 30 },
    { salary: 1400, score: 70 },
    { salary: 1500, score: 90 },
    { salary: 1600, score: 110 },
    { salary: 1700, score: 130 },
    { salary: 1800, score: 150 },
    { salary: 2000, score: 170 },
    { salary: 2200, score: 190 },
    { salary: 2300, score: 200 },
    { salary: 2400, score: 210 },
    { salary: 2500, score: 230 },
    { salary: 2600, score: 235 },
    { salary: 2800, score: 250 },
    { salary: 3000, score: 270 },
    { salary: 3100, score: 290 },
    { salary: 3200, score: 310 },
    { salary: 3300, score: 330 },
    { salary: 3400, score: 350 },
    { salary: 3500, score: 370 },
    { salary: 3600, score: 400 },
  ];
  for (let i = salaryMap.length - 1; i >= 0; i--) {
    if (salary >= salaryMap[i].salary) return salaryMap[i].score;
  }
  return 30;
}

// 根據目標分數自動勾選技能
function autoCheckSkillsByScore(targetScore) {
  resetState();
  let currentScore = 0;
  const today = new Date().toISOString().split('T')[0];

  // 按分類順序勾選技能，優先勾選基礎技能
  const categoryOrder = ['basic', 'partition', 'system', 'wood', 'attitude', 'app'];
  const sortedSkills = [...SKILLS].sort((a, b) => {
    const aIdx = categoryOrder.indexOf(a.cat);
    const bIdx = categoryOrder.indexOf(b.cat);
    if (aIdx !== bIdx) return aIdx - bIdx;
    return a.pts - b.pts; // 同類別先勾低分的
  });

  // 3星 = 60%，需要更多技能來達到目標分數
  const adjustedTarget = targetScore / 0.6;

  for (const skill of sortedSkills) {
    if (currentScore >= adjustedTarget) break;
    state.skills[skill.id] = {
      done: true,
      date: today,
      stars: 3, // 初始設為3星（未滿星，可修改）
      mentor: '系統初始化',
      locked: false, // 未滿星不鎖定
      history: [{
        date: today,
        mentor: '系統初始化',
        stars: 3,
        time: new Date().toISOString()
      }]
    };
    currentScore += skill.pts;
  }

  return Math.round(currentScore * 0.6); // 回傳實際分數（3星=60%）
}

      document.getElementById('mainContent').style.display = 'none';

    const sec = document.createElement('div');

    sec.dataset.cat = cat.id;
    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-header-icon" style="background:${cat.colorL};color:${cat.color}">${cat.icon}</div>
        <div class="cat-header-text"><h2>${cat.name}</h2><p>${cat.desc}</p></div>
      </div>
    `;

    // 有子分類的類別按子分類分組顯示
    if (SUBCATS[cat.id]) {
      SUBCATS[cat.id].forEach(subcat => {
        const subcatSkills = catSkills.filter(s => s.subcat === subcat.id);
        if (subcatSkills.length === 0) return;

        const subcatHeader = document.createElement('div');
        subcatHeader.className = 'subcat-header';
        subcatHeader.innerHTML = `<span class="subcat-icon">${subcat.icon}</span> ${subcat.name} <span class="subcat-count">${subcatSkills.length}項</span>`;
        sec.appendChild(subcatHeader);

        const grid = document.createElement('div');
        grid.className = 'skills-grid';
        subcatSkills.forEach(skill => grid.appendChild(buildSkillCard(skill, cat)));

    } else {
      const grid = document.createElement('div');
      grid.className = 'skills-grid';
      catSkills.forEach(skill => grid.appendChild(buildSkillCard(skill, cat)));
      sec.appendChild(grid);
    }

    content.appendChild(sec);
  });

    </div>
    <div class="card-cert">
      <select class="mentor-select" id="mentor-${skill.id}">
        <option value="">認證導師</option>
        ${MENTORS.map(m => `<option value="${m}">${m}</option>`).join('')}
      </select>
      <input type="date" class="date-input" id="date-${skill.id}">
      <button class="btn-cert" id="certBtn-${skill.id}">認證</button>
    </div>
    <div class="card-history" id="history-${skill.id}"></div>
  `;
  // Events
  card.querySelector(`#chk-${skill.id}`).addEventListener('click', () => toggleSkill(skill.id));
  card.querySelector(`#certBtn-${skill.id}`).addEventListener('click', () => certifySkill(skill.id));
  card.querySelectorAll(`#stars-${skill.id} .star`).forEach(star => {
    star.addEventListener('click', () => {
      // 檢查是否已鎖定
      if (isSkillLocked(skill.id)) {
        alert('此技能已滿星鎖定，無法修改');
        return;
      }
      const n = parseInt(star.dataset.n);
      state.skills[skill.id].stars = (state.skills[skill.id].stars === n) ? 0 : n;
      save(); renderStars(skill.id); updateActualPts(skill.id); updateStats();
    });
  });
  refreshSkillCard(skill.id);
  return card;
}

// 認證技能
function certifySkill(id) {
  // 檢查是否已鎖定
  if (isSkillLocked(id)) {
    alert('此技能已滿星鎖定，無法修改');
    return;
  }

  const mentor = document.getElementById(`mentor-${id}`).value;
  const date = document.getElementById(`date-${id}`).value || new Date().toISOString().split('T')[0];
  const stars = state.skills[id].stars || 3;

  if (!mentor) {
    alert('請選擇認證導師');
    return;
  }

  // 初始化歷史記錄
  if (!state.skills[id].history) state.skills[id].history = [];

  // 新增認證記錄
  state.skills[id].history.push({
    date: date,
    mentor: mentor,
    stars: stars,
    time: new Date().toISOString()
  });

  state.skills[id].done = true;
  state.skills[id].date = date;
  state.skills[id].mentor = mentor;
  state.skills[id].stars = stars;

  // 滿星自動鎖定
  if (stars === 5) {
    state.skills[id].locked = true;
  }

  save();
  refreshSkillCard(id);
  updateStats();
  renderHistory(id);
}

// 檢查技能是否已鎖定（必須同時滿足：已完成且為5星）
function isSkillLocked(id) {
  const s = state.skills[id];
  if (!s || !s.done) return false;
  // 只有5星才鎖定，3星或其他星數不鎖定
  const currentStars = getLastCertStars(id);
  return currentStars === 5;
}

// 取得最後一次認證時間
function getLastCertDate(id) {
  const history = state.skills[id]?.history || [];
  if (history.length === 0) return null;
  return history[history.length - 1].date;
}

// 取得最後一次認證的星數（用於計算分數）
function getLastCertStars(id) {
  const history = state.skills[id]?.history || [];
  if (history.length === 0) return state.skills[id]?.stars || 0;
  return history[history.length - 1].stars;
}

// 顯示認證歷史
function renderHistory(id) {
  const historyEl = document.getElementById(`history-${id}`);
  const history = state.skills[id].history || [];

  if (history.length === 0) {
    historyEl.innerHTML = '';
    return;
  }

  historyEl.innerHTML = '<div class="history-title">考核紀錄</div>' +
    history.map((h, i) => `
      <div class="history-item">
        <span class="history-date">${h.date}</span>
        <span class="history-mentor">${h.mentor}</span>
        <span class="history-stars">${'★'.repeat(h.stars)}${'☆'.repeat(5-h.stars)}</span>
      </div>
    `).join('');
}

// 計算實際得分（以最後一次認證的星數為準）
function getActualScore(skillId) {
  const skill = SKILLS.find(s => s.id === skillId);
  const s = state.skills[skillId];
  if (!s || !s.done) return 0;
  // 使用最後一次認證的星數
  const stars = getLastCertStars(skillId);
  // 星數比例：1星=20%, 2星=40%, 3星=60%, 4星=80%, 5星=100%
  const starRatio = (stars || 3) * 0.2;
  return Math.round(skill.pts * starRatio * 10) / 10;
}

// 更新實際得分顯示
function updateActualPts(id) {
  const actualEl = document.getElementById(`actual-${id}`);
  const s = state.skills[id];
  if (actualEl && s.done) {
    const actual = getActualScore(id);
    actualEl.textContent = `實得 ${actual} 分`;
  } else if (actualEl) {
    actualEl.textContent = '';
  }
}

function toggleSkill(id) {
  // 檢查是否已鎖定
  if (isSkillLocked(id)) {
    alert('此技能已滿星鎖定，無法修改');
    return;
  }
  const s = state.skills[id];
  s.done = !s.done;
  if (s.done && !s.date) s.date = new Date().toISOString().split('T')[0];
  if (s.done && !s.stars) s.stars = 3;
  save(); refreshSkillCard(id); updateStats();
}

function refreshSkillCard(id) {
  const s = state.skills[id];
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.toggle('done', s.done);
  card.classList.toggle('locked', isSkillLocked(id));
  const dateEl = card.querySelector(`#date-${id}`);
  if (dateEl) dateEl.value = s.date || '';
  const mentorEl = card.querySelector(`#mentor-${id}`);
  if (mentorEl) mentorEl.value = s.mentor || '';
  renderStars(id);
  updateActualPts(id);
  renderHistory(id);
}

function renderStars(id) {
  const val = state.skills[id].stars || 0;
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.querySelectorAll(`#stars-${id} .star`).forEach(s => {
    s.classList.toggle('lit', parseInt(s.dataset.n) <= val);
  });
}

// Training - 依職級顯示不同訓練內容
let currentTrainingRank = '學徒';

function buildTraining(rank) {
  rank = rank || currentTrainingRank;
  currentTrainingRank = rank;
  const trainingInfo = getTrainingDataForRank(rank);
  trainingData = trainingInfo.weeks;

  const container = document.getElementById('trainingContainer');
  let html = `<div class="section-header">${trainingInfo.title}（8周導師考核）</div>`;
  html += `<div style="padding:12px 24px;background:#f5f5f5;border-bottom:1px solid #ddd;">
    <span style="margin-right:12px;font-weight:500;">選擇職級訓練：</span>
    ${Object.keys(TRAINING_BY_RANK).map(r =>
      `<button onclick="buildTraining('${r}')" style="padding:6px 16px;margin-right:8px;border:2px solid ${r===rank?'var(--primary)':'#ddd'};border-radius:20px;background:${r===rank?'var(--primary)':'white'};color:${r===rank?'white':'#333'};cursor:pointer;font-weight:${r===rank?'bold':'normal'}">${r}</button>`
    ).join('')}
  </div>`;

  for (const [week, items] of Object.entries(trainingData)) {
    html += `<div class="week-card">
      <div class="week-header" onclick="toggleWeek('${week}')">
        <span class="week-title">${week}</span>
        <span class="week-progress" id="progress-${week.replace(/[｜]/g,'-')}">0/${items.length}</span>
      </div>
      <div class="week-content" id="content-${week.replace(/[｜]/g,'-')}">
        ${items.map(item => `
          <div class="training-item">
            <input type="checkbox" id="${item.id}" onchange="updateTrainingProgress()">
            <div>${item.text}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }
  container.innerHTML = html;

  // 載入已儲存的訓練進度
  loadTrainingProgress();
}

function toggleWeek(week) {
  const el = document.getElementById(`content-${week.replace(/[｜]/g,'-')}`);
  if (el) el.classList.toggle('hidden');
}

function loadTrainingProgress() {
  for (const [week, items] of Object.entries(trainingData)) {
    items.forEach(item => {
      const el = document.getElementById(item.id);
      if (el && state.training[item.id]) {
        el.checked = true;
      }
    });
  }
  updateTrainingProgress();
}

function updateTrainingProgress() {
  let totalChecked = 0, totalItems = 0;
  for (const [week, items] of Object.entries(trainingData)) {
    let weekChecked = 0;
    items.forEach(item => {
      const el = document.getElementById(item.id);
      if (el?.checked) { weekChecked++; totalChecked++; }
      state.training[item.id] = el?.checked || false;
      totalItems++;
    });
    const progressEl = document.getElementById(`progress-${week.replace(/[｜]/g,'-')}`);
    if (progressEl) progressEl.textContent = `${weekChecked}/${items.length}`;
  }
  const pct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
  document.getElementById('trainingProgress').textContent = `${pct}%`;
  document.getElementById('trainingWeek').textContent = currentTrainingRank + '訓練';
  save();
}

// Salary Table
function buildSalaryTable() {
  const tbody = document.getElementById('salaryTableBody');
  tbody.innerHTML = salaryTable.map(row => `
    <tr data-range="${row.range}">
      <td>${row.range}</td>
      <td>${row.position || '-'}</td>
      <td>$${row.daily.toLocaleString()}</td>
      <td>$${row.monthly.toLocaleString()}</td>
      <td>${row.grade}</td>
    </tr>
  `).join('');
}

// Stats
function updateStats() {
  const done = SKILLS.filter(s => state.skills[s.id].done);
  // 計算實際得分（含星數加權）
  const total = done.reduce((a, s) => a + getActualScore(s.id), 0);
  const maxTotal = SKILLS.reduce((a, s) => a + s.pts, 0); // 431

  document.getElementById('totalScore').textContent = Math.round(total * 10) / 10;
  document.getElementById('doneCount').textContent = done.length;

  const pct = Math.round((total / 431) * 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = `${pct}%`;
  fill.textContent = `${pct}%`;

  // Level & Salary
  let level, levelClass, salary;
  if (total <= 60) { level = "F 級"; levelClass = "level-F"; salary = 1300; }
  else if (total <= 100) { level = "F 級"; levelClass = "level-F"; salary = 1500; }
  else if (total <= 160) { level = "E 級"; levelClass = "level-E"; salary = 1800; }
  else if (total <= 240) { level = "D 級"; levelClass = "level-D"; salary = 2400; }
  else if (total <= 280) { level = "C 級"; levelClass = "level-C"; salary = 3000; }
  else if (total <= 340) { level = "B 級"; levelClass = "level-B"; salary = 3300; }
  else { level = "A 級"; levelClass = "level-A"; salary = 3600; }

  const badge = document.getElementById('levelBadge');
  badge.className = `level-badge ${levelClass}`;
  badge.textContent = `🎖️ ${level}`;
  document.getElementById('dailySalary').textContent = salary.toLocaleString();

  // Highlight salary row
  document.querySelectorAll('.salary-table tbody tr').forEach(row => {
    row.classList.remove('current');
    const range = row.dataset.range.split('-').map(Number);
    if (total >= range[0] && total <= (range[1] || 431)) row.classList.add('current');
  });

  // Category badges
  CATEGORIES.forEach(cat => {
    const cs = SKILLS.filter(s => s.cat === cat.id);
    const cd = cs.filter(s => state.skills[s.id].done);
    const badge = document.getElementById(`badge-${cat.id}`);
    if (badge) badge.textContent = `${cd.length}/${cs.length}`;
  });

  // 更新職級顯示
  const rankEl = document.getElementById('currentRank');
  if (rankEl && currentEmployee) {
    rankEl.textContent = getRankByScore(total);
  }
}

// Save/Load
function saveData() {
  const name = document.getElementById('employeeName').value;
  if (!name) {
    alert('請先選擇員工');
    return;
  }
  save();
  alert(`${name} 的進度已儲存！`);
}

function loadData() {
  // 頁面載入時不自動載入，等待使用者查詢
  updateStats();
}

function clearData() {
  const name = document.getElementById('employeeName').value;
  if (!name) {
    alert('請先選擇員工');
    return;
  }
  if (confirm(`確定要清除 ${name} 的所有資料嗎？`)) {
    const key = STORE_PREFIX + name;
    localStorage.removeItem(key);
    // 從索引中移除
    const index = getEmployeeIndex().filter(n => n !== name);
    localStorage.setItem(INDEX_KEY, JSON.stringify(index));
    location.reload();
  }
}
