  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  header {

  .header-kpis { display: flex; gap: 32px; align-items: center; }
  .kpi { text-align: center; }
  .kpi-val {

    font-size: 28px; color: #f5f0e8; line-height: 1;

  .kpi-label {

  .ob-label {

    color: rgba(245,240,232,0.30); text-transform: uppercase;
    letter-spacing: 1.5px;

  .ob-track {

    background: rgba(255,255,255,0.08);
    border-radius: 99px; overflow: hidden;
  }
  .ob-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--c-tools), var(--c-design));
    border-radius: 99px; width: 0%; transition: width 1s ease;

  .ob-pct {

    color: rgba(245,240,232,0.50); min-width: 56px; text-align: right;

  .cat-nav {

    display: flex; overflow-x: auto; scrollbar-width: none;
  }

  .cat-tab {
    display: flex; align-items: center; gap: 8px;
    padding: 13px 20px;
    font-size: 12px; font-weight: 500; color: var(--muted);
    cursor: pointer; border: none; background: transparent;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: color 0.18s, background 0.18s;
    white-space: nowrap;
  }
  .cat-tab:hover { color: var(--text); background: rgba(0,0,0,0.04); }
  .cat-tab.active { color: var(--text); border-bottom-color: var(--tab-c); }
  .tab-badge {
    font-size: 10px; font-family: 'DM Mono', monospace;
    padding: 1.5px 7px; border-radius: 99px;
    background: var(--border); color: var(--muted);

    padding: 36px 48px 80px;

  }

  .cat-header-text p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;

  .skill-card {

    border: 2px solid var(--border);

    position: relative;

  .skill-card.done { border-color: var(--done); background: var(--done-bg); }
  .card-stripe { height: 4px; }
  .card-main { padding: 15px 16px 0; }
  .card-top-row {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px; margin-bottom: 10px;

  .card-left { display: flex; align-items: center; gap: 9px; }
  .card-no {
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--muted); min-width: 28px;
  }
  .card-check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; cursor: pointer;
    transition: all 0.2s;
    color: transparent; background: transparent;

  .card-check:hover { border-color: var(--done); color: var(--done); }
  .done .card-check {

  .card-title { font-size: 14.5px; font-weight: 700; line-height: 1.35; margin-bottom: 5px; }
  .card-desc { font-size: 11.5px; color: var(--muted); line-height: 1.6; }
  .card-detail {
    margin-top: 13px; padding: 13px 16px 15px;
    background: rgba(0,0,0,0.024);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px;

  .detail-field { display: flex; flex-direction: column; gap: 5px; }
  .detail-label {
    font-size: 8.5px; font-family: 'DM Mono', monospace;

    font-weight: 500; color: var(--muted);

  .done .pts-val { color: var(--done); }
  .star-row { grid-column: 1 / -1; }
  .stars { display: flex; gap: 4px; align-items: center; margin-top: 1px; }
  .star {
    font-size: 20px; cursor: pointer;
    color: var(--star-off);
    transition: color 0.15s, transform 0.12s;
    user-select: none;

  .star:hover { transform: scale(1.18); }
  .star.lit { color: var(--star-on); }
  .star-desc {
    font-size: 10.5px; color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-left: 6px; min-width: 70px;

  .star-desc.has-val { color: var(--star-on); }
  .done-stamp {
    position: absolute; top: 13px; right: 13px;
    font-size: 10px; font-family: 'DM Mono', monospace;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 4px;
    border: 2px solid var(--done); color: var(--done);
    background: rgba(232,245,234,0.88);
    transform: rotate(-8deg);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .done .done-stamp { opacity: 0.82; }
  @media (max-width: 768px) {
    .header-top { padding: 20px; }
    .content { padding: 20px; }
    .skills-grid { grid-template-columns: 1fr; }

</style>
</head>

const STORE_KEY = 'wood-skill-v3';
const STAR_DESC = ['', '初步接觸', '基本了解', '能獨立操作', '熟練應用', '精通可教學'];
let state = {};

function initState() {
  try { state = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e) {}
  SKILLS.forEach(s => {
    if (!state[s.id]) state[s.id] = { done: false, date: '', stars: 0 };
  });
}
function save() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
}

function buildNav() {
  const nav = document.getElementById('cat-nav');
  CATEGORIES.forEach((cat, i) => {
    const catSkills = SKILLS.filter(s => s.cat === cat.id);
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (i===0 ? ' active' : '');
    btn.dataset.cat = cat.id;
    btn.style.setProperty('--tab-c', cat.color);
    btn.innerHTML = `
      <span>${cat.icon}</span>
      ${cat.name}
      <span class="tab-badge" id="tab-badge-${cat.id}">0/${catSkills.length}</span>
    `;
    btn.addEventListener('click', () => switchTab(cat.id));
    nav.appendChild(btn);
  });
}

function switchTab(catId) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === catId));
  document.querySelectorAll('.cat-section').forEach(s => s.classList.toggle('active', s.dataset.cat === catId));
}

function buildContent() {
  const content = document.getElementById('content');
  CATEGORIES.forEach((cat, ci) => {
    const catSkills = SKILLS.filter(s => s.cat === cat.id);
    const sec = document.createElement('div');
    sec.className = 'cat-section' + (ci===0 ? ' active' : '');
    sec.dataset.cat = cat.id;
    sec.innerHTML = `
      <div class="cat-header">
        <div class="cat-header-icon" style="background:${cat.colorL};color:${cat.color}">${cat.icon}</div>
        <div class="cat-header-text">
          <h2>${cat.name}</h2>
          <p>${cat.desc}</p>
        </div>
      </div>
    `;
    const grid = document.createElement('div');
    grid.className = 'skills-grid';
    catSkills.forEach(skill => grid.appendChild(buildCard(skill, cat)));
    sec.appendChild(grid);
    content.appendChild(sec);
  });
}

function buildCard(skill, cat) {
  const card = document.createElement('div');
  card.className = 'skill-card';
  card.id = `card-${skill.id}`;
  card.innerHTML = `
    <div class="done-stamp">完成</div>
    <div class="card-stripe" style="background:${cat.color}"></div>
    <div class="card-main">
      <div class="card-top-row">
        <div class="card-left">
          <span class="card-no">#${skill.id}</span>
        </div>
        <div class="card-check" id="chk-${skill.id}">✓</div>
      </div>
      <div class="card-title">${skill.title}</div>
      <div class="card-desc">${skill.desc || ''}</div>
    </div>
    <div class="card-detail">
      <div class="detail-field">
        <span class="detail-label">完成日期</span>
        <input type="date" class="date-input" id="date-${skill.id}">
      </div>
      <div class="detail-field">
        <span class="detail-label">學習點數</span>
        <span class="pts-val" id="pts-${skill.id}">${skill.pts} pts</span>
      </div>
      <div class="detail-field star-row">
        <span class="detail-label">掌握程度</span>
        <div class="stars" id="stars-${skill.id}">
          ${[1,2,3,4,5].map(n => `<span class="star" data-n="${n}">★</span>`).join('')}
          <span class="star-desc" id="sdesc-${skill.id}">尚未評分</span>
        </div>
      </div>
    </div>
  `;
  refreshCard(skill.id);
  card.querySelector(`#chk-${skill.id}`).addEventListener('click', () => toggleDone(skill.id));
  card.querySelector(`#date-${skill.id}`).addEventListener('change', e => {
    state[skill.id].date = e.target.value; save();
  });
  const starsEl = card.querySelector(`#stars-${skill.id}`);
  starsEl.querySelectorAll('.star').forEach(star => {
    const n = parseInt(star.dataset.n);
    star.addEventListener('click', () => {
      state[skill.id].stars = (state[skill.id].stars === n) ? 0 : n;
      save(); renderStars(skill.id);
    });
  });
  return card;
}

function renderStars(id) {
  const val = state[id].stars;
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.querySelectorAll(`#stars-${id} .star`).forEach(s => {
    const n = parseInt(s.dataset.n);
    s.classList.toggle('lit', n <= val);
  });
  const desc = card.querySelector(`#sdesc-${id}`);
  if (desc) {
    desc.textContent = val > 0 ? STAR_DESC[val] : '尚未評分';
    desc.classList.toggle('has-val', val > 0);
  }
}

function refreshCard(id) {
  const s = state[id];
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.toggle('done', s.done);
  const dateEl = card.querySelector(`#date-${id}`);
  if (dateEl) dateEl.value = s.date || '';
  renderStars(id);
}

function toggleDone(id) {
  const s = state[id];
  s.done = !s.done;
  if (s.done && !s.date) s.date = new Date().toISOString().split('T')[0];
  save(); refreshCard(id);
  updateStats();
}

function updateStats() {
  const done = SKILLS.filter(s => state[s.id].done);
  const donePts = done.reduce((a, s) => a + s.pts, 0);
  document.getElementById('kpi-done').textContent = done.length;
  document.getElementById('kpi-total').textContent = SKILLS.length;
  document.getElementById('kpi-pts').textContent = donePts;
  document.getElementById('ob-pct').textContent = `${done.length} / ${SKILLS.length} 項`;
  document.getElementById('ob-fill').style.width = (done.length / SKILLS.length * 100) + '%';
  CATEGORIES.forEach(cat => {
    const cs = SKILLS.filter(s => s.cat === cat.id);
    const cd = cs.filter(s => state[s.id].done);
    const badge = document.getElementById(`tab-badge-${cat.id}`);
    if (badge) badge.textContent = `${cd.length}/${cs.length}`;
  });
}

initState();
buildNav();
buildContent();
updateStats();
</script>
